function mouseDragged(){
	//code that mouse is not working behind gui
	var ghpos = guiHolder.position()
    var ghsize = guiHolder.size()
    var border = 25
    if((mouseX <= ghpos.x-border || mouseX >= ghpos.x + ghsize.width+border) || (mouseY <= ghpos.y-border || mouseY >= ghpos.y+ghsize.height+border)){
     //you need to put all mouse happing stuff here so it doesnt go behind gui   
		if(activeBox){
			activeBox.x += movedX
			activeBox.y += movedY
		}
	}
}

class TextBox {
	constructor(x, y, w, h, col, speed, direction, animation, label) { //object wird "geboren" und alles was individuell beistzen rein
		this.x = x
		this.y = y
		this.w = w
		this.h = h
		this.color = col
		this.speed = speed
		this.direction = direction
		this.animation = animation
		this.label = label
		this.frameCount = 0
		//this.loopcount = 150 //make this a variable on a slider  (for length)
		
		this.active = true
		this.activeRow = 0
		
		this.myColor = color(168, 117, 255)
		this.waveType = 'mountain peaks'
		this.amplitude = 20
		//this.rows = 5
		this.rows = []

	// *** listen to sliders here
		for(let i = 0; i < 1; i++){ //box start with 1 row
  			this.rows.push({
    		color: color(168, 117, 255),
   			amplitude: 20,
   			waveType: 'mountain peaks',
			label: "Wave",
			speed: 2,
			textsize: 40,
			direction: 1,
			lengthrow: 1,
			strokeweight:1 ,
			strokecolor: color(255,255,255),
			sizerow: 50
  			})
		}
		
		
		this.sizetext = 60
		//this.sizerow = 55
		this.sizecolumn = 270

	}

	display() {
		//print(keyCode)
		//textSize(this.textsize)
		this.frameCount++
	if(this.rows.length === 0) return //damit ned crashed wenn lösche
		//stroke(0)
		//strokeWeight(3)
		/*if(this.active){
			strokeWeight(2)
			stroke(255,0,0)	
		}*/

		
	
		//fill(255)
	//rectMode(CENTER)
	//rect(box.x, box.y, box.x + box.rows, box.y + box.sizetext )
	//rect(this.x, this.y, this.rows[0].lengthrow * 5 ,this.rows.length * this.sizerow)
		
		//zuesätzliche loop für y damit i chan reihe hinzuefüege aka row wird gmacht
	for(let rep = 0; rep < this.rows.length; rep++) {

		//for(let r = 0; r < this.rows.length; r++) {  // create rows/every row
			//let row = this.rows[r] //safe current row
				//let row = this.rows[this.activeRow]
				let row = this.rows[rep] //aktuelle reihe
												
								textSize(row.textsize)
								this.tw = textWidth(row.label)

					for(let i = 0; i < row.lengthrow; i++) { //how i draw the rows horizontal, how often repetition of text
								
							let anglerad = radians(row.direction)
								let xPos = this.x + (i-row.lengthrow)  * cos(anglerad) //- so goes in other direction
								let yPos = this.y + (i-row.lengthrow)  * sin(anglerad)

								let waveOffset = this.frameCount * row.speed //row.direction //seems it's going to the right

								let yWave = Waves.wave(xPos + waveOffset, {
									wave: row.waveType,
									t:     millis() * 0.001 * row.speed, //+= 0.01
									amplitude:  row.amplitude
								})
								
								//print(xPos,yPos)
								
								
								//rect(xPos, yPos, xPos + this.rows[0].lengthrow * 5 , yWave - this.rows.length * this.sizerow)
								
								//rect(this.x, this.y, this.rows[0].lengthrow * 5 ,this.rows.length * this.sizerow)
								//rect(this.x, this.y, this.rows[0].lengthrow * 5, this.rows.length * this.sizerow)
								//rect(this.x, this.y, this.x + this.rows[0].lengthrow * 5, this.y + this.rows.length * this.sizerow)
								//rect(this.x, yPos,  this.x + this.x + i, yWave - this.rows.length * this.sizerow)
								
								//rect(this.x, this.y, this.x + this.tw, this.y - row.textsize)
								textAlign(LEFT, BASELINE)
								fill(row.color)
								strokeWeight(row.strokeweight)
								stroke(row.strokecolor)
								text(row.label, //do wird row actually zeichnet
									xPos,
									yPos + yWave + rep * row.sizerow //rep and this.sizerow is needed for the adding rows
						
									//this.y+ yWave + r * this.sizerow
								)
							

					}
				} 
		/*}*/
		//rect(this.x, this.y, this.x + this.tw, this.y - this.rows[0].textsize)
		push()
		if(this.active){
			noFill()
			stroke(255,0,0)	
			strokeWeight(3)
			rectMode(CORNERS)
			rect(this.x- this.rows[0].lengthrow,
     		this.y - this.rows[0].textsize,
    		this.x + this.tw,
     		this.y + (this.rows.length - 1) * this.rows[0].sizerow)	
			pop()
		}	

	}
}

</script>
